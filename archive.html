<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive — Flowin' Hood</title>
<meta name="description" content="흐름공동체의 기록들. 게더링, 예배, 일상의 순간들.">
<meta property="og:title" content="Archive — Flowin' Hood">
<meta property="og:description" content="흐름공동체의 기록들.">
<meta property="og:url" content="https://flowinhood.com/archive">
<meta property="og:type" content="website">
<link rel="canonical" href="https://flowinhood.com/archive">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500&family=Gmarket+Sans:wght@700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Paperlogy';src:url('/fonts/Paperlogy-4Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('/fonts/Paperlogy-5Medium.woff2') format('woff2');font-weight:500;font-display:swap}

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0E0E0E;--paper:#EDEAE4;--grey:#A8A6A1;--mid:#565656;
  --f-head:'Gmarket Sans',sans-serif;
  --f-body:'Paperlogy','IBM Plex Sans KR',sans-serif;
  --f-mono:'IBM Plex Sans KR',sans-serif;
  --pad-x:clamp(20px,5vw,80px);
  --nav-h:64px;
}
html{font-size:12px;line-height:1.5;color:var(--ink);background:var(--paper)}
body{font-family:var(--f-body);font-weight:400}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  height:var(--nav-h);background:var(--paper);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--pad-x);border-bottom:1px solid rgba(14,14,14,0.08);
}
.nav-logo{height:22px;display:flex;align-items:center}
.nav-logo svg{height:22px;width:auto}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{font-family:var(--f-body);font-weight:500;font-size:11px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink);transition:opacity 0.2s}
.nav-links a:hover{opacity:0.5}
.nav-links a.active{opacity:0.4}
.nav-burger{display:none;background:none;border:none;cursor:pointer;padding:4px;flex-direction:column;gap:5px}
.nav-burger span{display:block;width:22px;height:1.5px;background:var(--ink);transition:all 0.3s}
.drawer{display:none;position:fixed;top:0;left:0;right:0;height:52svh;background:var(--paper);z-index:200;padding:var(--nav-h) var(--pad-x) 32px;flex-direction:column;justify-content:center;gap:24px;transform:translateY(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1)}
.drawer.open{transform:translateY(0)}
.drawer a{font-family:var(--f-body);font-weight:500;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink)}
.drawer-close{position:absolute;top:20px;right:var(--pad-x);background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink)}
.overlay{display:none;position:fixed;inset:0;background:rgba(14,14,14,0.35);z-index:150;backdrop-filter:blur(2px)}
.overlay.show{display:block}

/* MAIN */
main{padding:48px var(--pad-x) 80px;max-width:1280px;margin:0 auto}
.section-label{font-family:var(--f-mono);font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey);margin-bottom:12px}
.headline{font-family:var(--f-head);font-size:clamp(22px,4vw,36px);font-weight:700;line-height:1.25;margin-bottom:8px}
.sub{font-family:var(--f-body);font-size:12px;color:var(--mid);margin-bottom:40px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{cursor:pointer;display:flex;flex-direction:column;background:transparent}
.card-img{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--ink);margin-bottom:12px;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%);transition:filter 0.4s}
.card:hover .card-img img{filter:grayscale(60%)}
.card-img-placeholder{width:100%;height:100%;background:var(--ink);display:flex;align-items:center;justify-content:center}
.card-img-placeholder svg{opacity:0.15}
.card-date{font-family:var(--f-mono);font-size:10px;color:var(--grey);margin-bottom:4px}
.card-title{font-family:var(--f-body);font-weight:500;font-size:13px;line-height:1.4;color:var(--ink);margin-bottom:6px}
.card-tag{font-family:var(--f-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--grey)}

/* SKELETON */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
.sk-img{width:100%;aspect-ratio:16/9;background:rgba(14,14,14,0.08);margin-bottom:12px}
.sk-line{height:10px;background:rgba(14,14,14,0.08);border-radius:2px;margin-bottom:6px}
.sk-line.w60{width:60%}
.sk-line.w80{width:80%}
.sk-line.w40{width:40%}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:80px 0;color:var(--grey);font-family:var(--f-mono);font-size:11px;letter-spacing:0.1em}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(14,14,14,0.75);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--paper);width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative;padding:40px}
.modal-close{position:sticky;top:0;float:right;background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink);line-height:1;margin-left:12px;margin-bottom:16px}
.modal-slider{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;margin-bottom:20px;background:var(--ink)}
.modal-slider img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%)}
.slider-nav{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.slider-dot{width:6px;height:6px;border-radius:50%;background:rgba(237,234,228,0.4);border:none;cursor:pointer;padding:0}
.slider-dot.active{background:#EDEAE4}
.slider-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(237,234,228,0.15);border:none;cursor:pointer;color:#EDEAE4;font-size:18px;padding:10px 14px;line-height:1}
.slider-arr.prev{left:8px}
.slider-arr.next{right:8px}
.modal-tag{font-family:var(--f-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);margin-bottom:8px}
.modal-date{font-family:var(--f-mono);font-size:10px;color:var(--grey);margin-bottom:12px}
.modal-title{font-family:var(--f-head);font-size:22px;font-weight:700;line-height:1.3;margin-bottom:20px}
.modal-body{font-family:var(--f-body);font-size:13px;line-height:1.7;color:var(--mid);white-space:pre-wrap}

/* FOOTER */
footer{background:var(--ink);padding:24px var(--pad-x) 16px}
.footer-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding-bottom:16px;border-bottom:1px solid rgba(237,234,228,0.1);margin-bottom:12px}
.footer-logo svg path[fill="#0E0E0E"]{fill:#EDEAE4}
.footer-logo svg path[fill="#EDEAE4"]{fill:#0E0E0E}
.footer-nav{display:flex;flex-direction:column;gap:10px}
.footer-nav a{font-family:var(--f-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(237,234,228,0.55);transition:color 0.2s}
.footer-nav a:hover{color:#EDEAE4}
.footer-contact{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.footer-contact a{font-family:var(--f-mono);font-size:10px;color:rgba(237,234,228,0.55);transition:color 0.2s}
.footer-contact a:hover{color:#EDEAE4}
.footer-bottom{font-family:var(--f-mono);font-size:10px;color:rgba(237,234,228,0.3);letter-spacing:0.06em}

@media(max-width:768px){
  .nav-links{display:none}
  .nav-burger{display:flex}
  .drawer{display:flex}
  .grid{grid-template-columns:1fr}
  .footer-top{grid-template-columns:1fr;gap:20px}
  .footer-contact{align-items:flex-start}
  .modal{padding:24px}
}
@media(min-width:769px) and (max-width:1024px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <svg viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg" height="22">
      <rect width="120" height="28" rx="14" fill="#0E0E0E"/>
      <text x="12" y="19" font-family="'Gmarket Sans',sans-serif" font-weight="700" font-size="11" fill="#EDEAE4" letter-spacing="1">FLOWIN' HOOD</text>
    </svg>
  </a>
  <div class="nav-links">
    <a href="/about">About</a>
    <a href="/connect">Connect</a>
    <a href="/archive" class="active">Archive</a>
    <a href="/give">Give</a>
  </div>
  <button class="nav-burger" id="burger" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">✕</button>
  <a href="/about">About</a>
  <a href="/connect">Connect</a>
  <a href="/archive">Archive</a>
  <a href="/give">Give</a>
</div>

<main>
  <p class="section-label">Archive</p>
  <h1 class="headline">흐름공동체의 기록들.</h1>
  <p class="sub">게더링, 예배, 일상. 함께한 순간들을 기록합니다.</p>

  <div class="grid" id="grid">
    <!-- skeleton -->
    <div class="card skeleton" id="sk1"><div class="sk-img"></div><div class="sk-line w40"></div><div class="sk-line w80"></div><div class="sk-line w60"></div></div>
    <div class="card skeleton" id="sk2"><div class="sk-img"></div><div class="sk-line w40"></div><div class="sk-line w80"></div><div class="sk-line w60"></div></div>
    <div class="card skeleton" id="sk3"><div class="sk-img"></div><div class="sk-line w40"></div><div class="sk-line w80"></div><div class="sk-line w60"></div></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="닫기">✕</button>
    <div class="modal-slider" id="sliderWrap" style="display:none">
      <img id="sliderImg" src="" alt="">
      <button class="slider-arr prev" id="sliderPrev">‹</button>
      <button class="slider-arr next" id="sliderNext">›</button>
      <div class="slider-nav" id="sliderDots"></div>
    </div>
    <p class="modal-tag" id="modalTag"></p>
    <p class="modal-date" id="modalDate"></p>
    <h2 class="modal-title" id="modalTitle"></h2>
    <p class="modal-body" id="modalBody"></p>
  </div>
</div>

<footer>
  <div class="footer-top">
    <div class="footer-logo">
      <svg viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg" height="20">
        <rect width="120" height="28" rx="14" fill="#EDEAE4"/>
        <text x="12" y="19" font-family="'Gmarket Sans',sans-serif" font-weight="700" font-size="11" fill="#0E0E0E" letter-spacing="1">FLOWIN' HOOD</text>
      </svg>
    </div>
    <nav class="footer-nav">
      <a href="/about">About</a>
      <a href="/connect">Connect</a>
      <a href="/archive">Archive</a>
      <a href="/give">Give</a>
    </nav>
    <div class="footer-contact">
      <a href="https://instagram.com/flowinhood" target="_blank" rel="noopener">@flowinhood</a>
      <a href="mailto:contact@flowinhood.com">contact@flowinhood.com</a>
    </div>
  </div>
  <p class="footer-bottom">© 2026 Flowin' Hood · KR · 37°N</p>
</footer>

<script>
const API = 'https://api.flowinhood.com';

// Nav drawer
const burger=document.getElementById('burger'),drawer=document.getElementById('drawer'),overlay=document.getElementById('overlay'),drawerClose=document.getElementById('drawerClose');
function openDrawer(){drawer.classList.add('open');overlay.classList.add('show')}
function closeDrawer(){drawer.classList.remove('open');overlay.classList.remove('show')}
burger.addEventListener('click',openDrawer);
drawerClose.addEventListener('click',closeDrawer);
overlay.addEventListener('click',closeDrawer);

// Modal
const modalEl=document.getElementById('modal'),modalClose=document.getElementById('modalClose');
let currentImages=[],currentIdx=0;

function openModal(post){
  currentImages=post.images||[];
  currentIdx=0;
  document.getElementById('modalTag').textContent=post.tag||'';
  document.getElementById('modalDate').textContent=post.date||'';
  document.getElementById('modalTitle').textContent=post.title||'';
  document.getElementById('modalBody').textContent=post.body||'';
  const wrap=document.getElementById('sliderWrap');
  if(currentImages.length>0){
    wrap.style.display='block';
    renderSlide();
  } else {
    wrap.style.display='none';
  }
  modalEl.classList.add('open');
  document.body.style.overflow='hidden';
}

function renderSlide(){
  const img=document.getElementById('sliderImg');
  img.src=currentImages[currentIdx];
  const dots=document.getElementById('sliderDots');
  dots.innerHTML=currentImages.map((_,i)=>`<button class="slider-dot${i===currentIdx?' active':''}" data-i="${i}" aria-label="${i+1}번 이미지"></button>`).join('');
  dots.querySelectorAll('.slider-dot').forEach(d=>d.addEventListener('click',()=>{currentIdx=+d.dataset.i;renderSlide()}));
  document.getElementById('sliderPrev').style.display=currentImages.length>1?'block':'none';
  document.getElementById('sliderNext').style.display=currentImages.length>1?'block':'none';
}

document.getElementById('sliderPrev').addEventListener('click',()=>{currentIdx=(currentIdx-1+currentImages.length)%currentImages.length;renderSlide()});
document.getElementById('sliderNext').addEventListener('click',()=>{currentIdx=(currentIdx+1)%currentImages.length;renderSlide()});

function closeModal(){modalEl.classList.remove('open');document.body.style.overflow=''}
modalClose.addEventListener('click',closeModal);
modalEl.addEventListener('click',e=>{if(e.target===modalEl)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// Load posts
function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function renderCard(post){
  const card=document.createElement('div');
  card.className='card';
  const imgHtml=post.cover
    ?`<img src="${post.cover}" alt="${post.title}" loading="lazy">`
    :`<div class="card-img-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="#EDEAE4" stroke-width="1.5"/><circle cx="8.5" cy="10.5" r="1.5" fill="#EDEAE4"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="#EDEAE4" stroke-width="1.5" stroke-linecap="round"/></svg></div>`;
  card.innerHTML=`
    <div class="card-img">${imgHtml}</div>
    <p class="card-date">${fmtDate(post.date||post.created_at)}</p>
    <p class="card-title">${post.title||''}</p>
    <p class="card-tag">${post.tag||''}</p>
  `;
  card.addEventListener('click',()=>openModal(post));
  return card;
}

async function loadPosts(){
  const grid=document.getElementById('grid');
  try{
    const res=await fetch(`${API}/posts`);
    if(!res.ok)throw new Error('api error');
    const posts=await res.json();
    grid.innerHTML='';
    if(!posts.length){
      grid.innerHTML='<p class="empty">아직 기록이 없습니다.</p>';
      return;
    }
    posts.forEach(p=>grid.appendChild(renderCard(p)));
  }catch(e){
    grid.innerHTML='<p class="empty">기록을 불러올 수 없습니다.</p>';
  }
}

loadPosts();
</script>
</body>
</html>
