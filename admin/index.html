<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Flowin' Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0E0E0E;--paper:#EDEAE4;--grey:#A8A6A1;--mid:#565656;--red:#C0392B}
html{font-size:13px;line-height:1.5;color:var(--ink);background:#F5F3EE;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper)}
.login-box{width:320px}
.login-logo{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey);margin-bottom:32px}
.login-title{font-size:22px;font-weight:700;margin-bottom:24px}
.form-group{margin-bottom:16px}
label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);margin-bottom:6px}
input[type=password],input[type=text],input[type=date],textarea,select{
  width:100%;padding:10px 12px;border:1px solid rgba(14,14,14,0.2);background:#fff;
  font-size:13px;font-family:inherit;color:var(--ink);outline:none;
  transition:border-color 0.2s
}
input:focus,textarea:focus,select:focus{border-color:var(--ink)}
.btn{display:inline-block;padding:10px 20px;font-size:12px;font-weight:500;letter-spacing:0.05em;border:none;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.8}
.btn-primary{background:var(--ink);color:var(--paper);width:100%}
.btn-sm{padding:6px 14px;font-size:11px}
.btn-outline{background:transparent;border:1px solid var(--ink);color:var(--ink)}
.btn-danger{background:var(--red);color:#fff}
.error-msg{font-size:11px;color:var(--red);margin-top:8px}

/* LAYOUT */
.app{display:none;min-height:100vh}
.sidebar{width:200px;background:var(--ink);padding:24px 16px;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column}
.sidebar-logo{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(237,234,228,0.4);margin-bottom:32px}
.sidebar-nav{display:flex;flex-direction:column;gap:6px}
.sidebar-nav button{background:none;border:none;text-align:left;padding:8px 10px;font-size:12px;letter-spacing:0.04em;color:rgba(237,234,228,0.7);border-radius:2px;transition:background 0.15s}
.sidebar-nav button:hover,.sidebar-nav button.active{background:rgba(237,234,228,0.1);color:#EDEAE4}
.sidebar-logout{margin-top:auto;font-size:11px;color:rgba(237,234,228,0.3);cursor:pointer;background:none;border:none;text-align:left;padding:8px 10px}
.sidebar-logout:hover{color:rgba(237,234,228,0.6)}
.content{margin-left:200px;padding:32px}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-size:18px;font-weight:700}

/* POST LIST */
.post-list{display:flex;flex-direction:column;gap:8px}
.post-item{background:#fff;padding:16px 20px;display:flex;align-items:center;gap:16px}
.post-item-img{width:64px;height:40px;object-fit:cover;filter:grayscale(100%);flex-shrink:0;background:#ddd}
.post-item-info{flex:1;min-width:0}
.post-item-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-item-meta{font-size:11px;color:var(--grey);margin-top:2px}
.post-item-status{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:3px 7px;border-radius:2px}
.status-published{background:#D5EDDA;color:#1E6B37}
.status-draft{background:#F0F0EE;color:var(--grey)}
.post-item-actions{display:flex;gap:8px;flex-shrink:0}
.empty-list{text-align:center;padding:60px;color:var(--grey);font-size:12px}

/* EDITOR */
.editor-wrap{max-width:700px}
.editor-fields{display:flex;flex-direction:column;gap:18px}
textarea{resize:vertical;min-height:200px}
.img-upload-zone{border:1px dashed rgba(14,14,14,0.2);padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;background:#fff}
.img-upload-zone:hover{border-color:var(--ink)}
.img-upload-zone input{display:none}
.img-upload-label{font-size:12px;color:var(--grey)}
.img-previews{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.img-preview-item{position:relative}
.img-preview-item img{width:100px;height:64px;object-fit:cover;filter:grayscale(100%);display:block}
.img-remove{position:absolute;top:2px;right:2px;background:rgba(14,14,14,0.7);color:#fff;border:none;width:18px;height:18px;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.editor-actions{display:flex;gap:10px;margin-top:24px}
.saving-msg{font-size:11px;color:var(--grey);align-self:center}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(14,14,14,0.6);z-index:500;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;padding:28px;width:300px}
.confirm-text{font-size:13px;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px;justify-content:flex-end}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <p class="login-logo">Flowin' Hood · Admin</p>
    <h1 class="login-title">로그인</h1>
    <div class="form-group">
      <label for="idInput">아이디</label>
      <input type="text" id="idInput" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="pwInput">비밀번호</label>
      <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn">로그인</button>
    <p class="error-msg" id="loginErr" style="display:none">아이디 또는 비밀번호가 맞지 않습니다.</p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar">
    <p class="sidebar-logo">Archive Admin</p>
    <nav class="sidebar-nav">
      <button id="navList" class="active">포스트 목록</button>
      <button id="navNew">새 포스트</button>
    </nav>
    <button class="sidebar-logout" id="logoutBtn">로그아웃</button>
  </aside>

  <div class="content">
    <!-- LIST VIEW -->
    <div id="viewList">
      <div class="page-header">
        <h2 class="page-title">포스트 목록</h2>
        <button class="btn btn-primary btn-sm" id="newPostBtn">+ 새 포스트</button>
      </div>
      <div class="post-list" id="postList">
        <p class="empty-list" id="listEmpty" style="display:none">포스트가 없습니다.</p>
      </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="viewEditor" style="display:none">
      <div class="page-header">
        <h2 class="page-title" id="editorTitle">새 포스트</h2>
        <button class="btn btn-outline btn-sm" id="editorBack">← 목록으로</button>
      </div>
      <div class="editor-wrap">
        <div class="editor-fields">
          <div class="form-group">
            <label>제목</label>
            <input type="text" id="fTitle" placeholder="제목을 입력하세요">
          </div>
          <div class="form-group">
            <label>날짜</label>
            <input type="date" id="fDate">
          </div>
          <div class="form-group">
            <label>태그 (게더링)</label>
            <select id="fTag">
              <option value="">— 선택 —</option>
              <option>Bible After Hours</option>
              <option>Flow in the Camping</option>
              <option>AI 개발 Study</option>
              <option>영종도 HOOD 게더링</option>
              <option>Full Gathering</option>
              <option>기타</option>
            </select>
          </div>
          <div class="form-group">
            <label>본문</label>
            <textarea id="fBody" placeholder="내용을 입력하세요."></textarea>
          </div>
          <div class="form-group">
            <label>이미지</label>
            <div class="img-upload-zone" id="dropZone">
              <input type="file" id="fileInput" accept="image/*" multiple>
              <p class="img-upload-label">클릭하거나 드래그하여 이미지를 업로드하세요<br><span style="font-size:10px;color:#A8A6A1">JPG, PNG, WEBP · 파일당 최대 20MB</span></p>
            </div>
            <div class="img-previews" id="imgPreviews"></div>
          </div>
          <div class="form-group">
            <label>상태</label>
            <select id="fStatus">
              <option value="published">발행</option>
              <option value="draft">임시저장</option>
            </select>
          </div>
        </div>
        <div class="editor-actions">
          <button class="btn btn-primary" id="saveBtn">저장</button>
          <span class="saving-msg" id="savingMsg" style="display:none">저장 중...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p class="confirm-text" id="confirmText">삭제하시겠습니까?</p>
    <div class="confirm-btns">
      <button class="btn btn-outline btn-sm" id="confirmNo">취소</button>
      <button class="btn btn-danger btn-sm" id="confirmYes">삭제</button>
    </div>
  </div>
</div>

<script>
const API = 'https://api.flowinhood.com';
let token = sessionStorage.getItem('archiveToken') || '';
let editingId = null;
let uploadedImages = [];

// ── Auth ──
function getHeaders(extra={}){return{Authorization:`Bearer ${token}`,...extra}}

async function checkToken(){
  if(!token)return false;
  try{const r=await fetch(`${API}/posts/all`,{headers:getHeaders()});return r.ok}
  catch{return false}
}

async function init(){
  if(token && await checkToken()){showApp()}
}

document.getElementById('loginBtn').addEventListener('click',login);
document.getElementById('idInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pwInput').focus()});
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')login()});

async function login(){
  const id=document.getElementById('idInput').value.trim();
  const pw=document.getElementById('pwInput').value;
  const err=document.getElementById('loginErr');
  err.style.display='none';
  try{
    const r=await fetch(`${API}/auth`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:pw})});
    if(!r.ok){err.style.display='block';return}
    const d=await r.json();
    token=d.token;
    sessionStorage.setItem('archiveToken',token);
    showApp();
  }catch{err.textContent='서버에 연결할 수 없습니다.';err.style.display='block'}
}

document.getElementById('logoutBtn').addEventListener('click',()=>{
  token='';sessionStorage.removeItem('archiveToken');
  document.getElementById('app').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
});

function showApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  showList();
}

// ── NAV ──
document.getElementById('navList').addEventListener('click',showList);
document.getElementById('navNew').addEventListener('click',()=>showEditor(null));
document.getElementById('newPostBtn').addEventListener('click',()=>showEditor(null));
document.getElementById('editorBack').addEventListener('click',showList);

function setNavActive(id){
  document.querySelectorAll('.sidebar-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── LIST ──
async function showList(){
  setNavActive('navList');
  document.getElementById('viewList').style.display='block';
  document.getElementById('viewEditor').style.display='none';
  await loadPosts();
}

async function loadPosts(){
  const list=document.getElementById('postList');
  try{
    const r=await fetch(`${API}/posts/all`,{headers:getHeaders()});
    const posts=await r.json();
    list.innerHTML='';
    const empty=document.getElementById('listEmpty');
    if(!posts.length){empty.style.display='block';return}
    empty.style.display='none';
    posts.forEach(p=>{
      const item=document.createElement('div');
      item.className='post-item';
      item.innerHTML=`
        ${p.cover?`<img class="post-item-img" src="${p.cover}" alt="">`:`<div class="post-item-img"></div>`}
        <div class="post-item-info">
          <p class="post-item-title">${p.title||'(제목 없음)'}</p>
          <p class="post-item-meta">${p.date||''} · ${p.tag||''}</p>
        </div>
        <span class="post-item-status status-${p.status}">${p.status==='published'?'발행':'임시저장'}</span>
        <div class="post-item-actions">
          <button class="btn btn-outline btn-sm" data-edit="${p.id}">편집</button>
          <button class="btn btn-danger btn-sm" data-del="${p.id}">삭제</button>
        </div>
      `;
      item.querySelector('[data-edit]').addEventListener('click',()=>showEditor(p));
      item.querySelector('[data-del]').addEventListener('click',()=>confirmDelete(p.id,p.title));
      list.appendChild(item);
    });
  }catch{document.getElementById('listEmpty').textContent='로드 실패';document.getElementById('listEmpty').style.display='block'}
}

// ── DELETE CONFIRM ──
let deleteId=null;
function confirmDelete(id,title){
  deleteId=id;
  document.getElementById('confirmText').textContent=`"${title||'이 포스트'}"를 삭제하시겠습니까?`;
  document.getElementById('confirmOverlay').classList.add('open');
}
document.getElementById('confirmNo').addEventListener('click',()=>document.getElementById('confirmOverlay').classList.remove('open'));
document.getElementById('confirmYes').addEventListener('click',async()=>{
  document.getElementById('confirmOverlay').classList.remove('open');
  await fetch(`${API}/posts/${deleteId}`,{method:'DELETE',headers:getHeaders()});
  loadPosts();
});

// ── EDITOR ──
function showEditor(post){
  setNavActive('navNew');
  document.getElementById('viewList').style.display='none';
  document.getElementById('viewEditor').style.display='block';
  editingId=post?post.id:null;
  uploadedImages=post?[...(post.images||[])]:[];
  document.getElementById('editorTitle').textContent=post?'포스트 편집':'새 포스트';
  document.getElementById('fTitle').value=post?.title||'';
  document.getElementById('fDate').value=post?.date||(new Date().toISOString().slice(0,10));
  document.getElementById('fTag').value=post?.tag||'';
  document.getElementById('fBody').value=post?.body||'';
  document.getElementById('fStatus').value=post?.status||'published';
  renderPreviews();
}

// ── IMAGE UPLOAD ──
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='var(--ink)'});
dropZone.addEventListener('dragleave',()=>dropZone.style.borderColor='');
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor='';handleFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',()=>handleFiles(fileInput.files));

async function handleFiles(files){
  for(const f of files){
    const fd=new FormData();fd.append('file',f);
    try{
      const r=await fetch(`${API}/upload`,{method:'POST',headers:getHeaders(),body:fd});
      if(r.ok){const d=await r.json();uploadedImages.push(d.url);renderPreviews()}
    }catch{}
  }
  fileInput.value='';
}

function renderPreviews(){
  const wrap=document.getElementById('imgPreviews');
  wrap.innerHTML=uploadedImages.map((url,i)=>`
    <div class="img-preview-item">
      <img src="${url}" alt="">
      <button class="img-remove" data-i="${i}">✕</button>
    </div>
  `).join('');
  wrap.querySelectorAll('.img-remove').forEach(btn=>btn.addEventListener('click',()=>{
    uploadedImages.splice(+btn.dataset.i,1);renderPreviews();
  }));
}

// ── SAVE ──
document.getElementById('saveBtn').addEventListener('click',savePost);

async function savePost(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){alert('제목을 입력하세요.');return}
  const payload={
    title,
    body:document.getElementById('fBody').value.trim(),
    tag:document.getElementById('fTag').value,
    date:document.getElementById('fDate').value,
    status:document.getElementById('fStatus').value,
    images:uploadedImages,
  };
  const savingMsg=document.getElementById('savingMsg');
  savingMsg.style.display='inline';
  try{
    const url=editingId?`${API}/posts/${editingId}`:`${API}/posts`;
    const method=editingId?'PUT':'POST';
    const r=await fetch(url,{method,headers:{...getHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.ok)showList();
    else alert('저장 실패');
  }catch{alert('서버 연결 실패')}
  finally{savingMsg.style.display='none'}
}

init();
</script>
</body>
</html>
